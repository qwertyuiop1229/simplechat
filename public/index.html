<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <!-- ここにnoindexメタタグを追加してGoogle検索からのインデックス登録を防ぎます -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <link rel="apple-touch-icon" href="icon-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* --- 全画面化用 --- */
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #f3f4f6;
        font-family: "Inter", sans-serif;
        /* メッセージ入力欄以外での文字選択を無効化 */
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      /* 入力フィールドでのみ文字選択を許可 */
      textarea, input[type="text"], input[type="email"], input[type="password"] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: none;
        height: 100vh;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        border-radius: 0;
        overflow: hidden;
        background-color: #ffffff;
        box-shadow: none;
      }

      .message-bubble {
        max-width: 75%;
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        margin-bottom: 0.5rem;
        word-wrap: break-word;
        -webkit-touch-callout: none; /* iOS長押しメニュー防止 */
      }
      .my-message {
        background-color: #e0e0e0; /* 薄いグレー */
        border-bottom-right-radius: 0.25rem;
      }
      .other-message {
        background-color: #f0f0f0; /* 非常に薄いグレー */
        border-bottom-left-radius: 0.25rem;
      }
      .scrollable {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      /* カスタムスクロールバー */
      .scrollable::-webkit-scrollbar {
        width: 6px;
      }
      .scrollable::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollable::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
      }
      .scrollable::-webkit-scrollbar-thumb:hover {
        background: #999;
      }
      /* モーダル背景 */
      .modal-overlay {
        background-color: rgba(0, 0, 0, 0.75);
      }
      /* ドロップダウンコンテナのスタイル */
      .dropdown-container {
        position: relative;
        display: inline-block;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 100px;
        box-shadow: 0px 4px 8px 0px rgba(0, 0, 0, 0.2);
        z-index: 10;
        right: 0;
        border-radius: 0.5rem;
        overflow: hidden;
        border: 1px solid #ddd;
      }
      .dropdown-content button {
        color: black;
        padding: 8px 12px;
        text-decoration: none;
        display: block;
        width: 100%;
        text-align: left;
        border: none;
        background-color: transparent;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.875rem;
      }
      .dropdown-content button:hover {
        background-color: #f0f0f0;
      }

      /* メッセージ内容と入力欄 */
      .message-content {
        white-space: pre-wrap;
        word-wrap: break-word;
        word-break: break-word;
      }
      textarea#messageInput {
        white-space: pre-wrap;
        word-wrap: break-word;
        word-break: break-word;
        overflow-y: auto;
        resize: none;
        min-height: 44px;
        max-height: 200px;
        background-color: #f3f4f6;
        border: 1px solid #e5e7eb;
        
        /* ★スクロールバーを非表示にする設定 */
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      /* ★Chrome, Safari, Opera用 */
      textarea#messageInput::-webkit-scrollbar {
        display: none;
      }
      
      textarea#messageInput:focus {
        background-color: #f3f4f6;
        outline: none;
      }

      /* 既読表示 */
      .read-receipt {
        font-size: 0.7rem;
        color: #888;
        margin-top: 2px;
        display: block;
        text-align: right;
      }
      .other-message .read-receipt {
        text-align: left;
      }

      /* カスタムコンテキストメニュー */
      .custom-context-menu {
        position: absolute;
        background-color: white;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        border: 1px solid #ddd;
        border-radius: 0.5rem;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 100;
        padding: 4px 0;
        min-width: 120px;
      }
      .custom-context-menu button {
        display: block;
        width: 100%;
        padding: 8px 12px;
        text-align: left;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
        color: black;
      }
      .custom-context-menu button:hover {
        background-color: #f0f0f0;
      }

      /* サイドバーリサイズ用ハンドル */
      #resizer {
        width: 2px;
        cursor: col-resize;
        background-color: #e5e7eb;
        transition: background-color 0.2s;
        flex-shrink: 0;
      }
      #resizer:hover {
        background-color: #d1d5db;
      }

      /* リプライ機能用CSS */
      .reply-quote {
        background-color: rgba(0, 0, 0, 0.05);
        padding: 6px 10px;
        border-radius: 8px;
        margin-bottom: 6px;
        cursor: pointer;
        font-size: 0.875rem;
      }
      .reply-quote-nickname {
        font-size: 0.75rem;
        color: #555;
        font-weight: 600;
      }
      .reply-quote-text {
        color: #333;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .message-highlight {
        transition: background-color 0.8s ease-out;
        background-color: #bde4ff !important;
      }

      /* --- メンバーリスト用スタイル (Discord風) --- */
      #membersSidebar {
        width: 240px;
        background-color: #f9fafb;
        border-left: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      .member-group-title {
        font-size: 0.75rem;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        padding: 1rem 1rem 0.5rem 1rem;
        letter-spacing: 0.05em;
      }
      .member-item {
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        cursor: pointer;
        transition: background-color 0.1s;
        border-radius: 0.25rem;
        margin: 0 0.5rem;
      }
      .member-item:hover {
        background-color: #e5e7eb;
      }
      .avatar-placeholder {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background-color: #374151;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        font-weight: 600;
        margin-right: 0.75rem;
        position: relative;
        flex-shrink: 0;
      }
      .avatar-placeholder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      /* ステータスバッジ */
      .status-indicator {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        position: absolute;
        bottom: -1px;
        right: -1px;
        border: 2px solid #f9fafb;
      }
      .status-online { background-color: #22c55e; }
      .status-away { background-color: #facc15; }
      .status-offline { background-color: #9ca3af; }
      
      .member-info {
        flex: 1;
        overflow: hidden;
      }
      .member-name {
        font-size: 0.9rem;
        font-weight: 500;
        color: #1f2937;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .member-status-text {
        font-size: 0.7rem;
        color: #6b7280;
      }

      /* ユーザーパネル (Discord風マイページ) */
      #userPanel {
        background-color: #ebedef; /* サイドバーより少し濃いグレー */
        padding: 0.75rem;
        display: flex;
        align-items: center;
        border-top: 1px solid #d1d5db;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      #userPanel:hover {
        background-color: #e5e7eb;
      }
      .user-panel-info {
        flex: 1;
        overflow: hidden;
        margin-right: 0.5rem;
      }
      .user-panel-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: #1f2937;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-panel-id {
        font-size: 0.75rem;
        color: #6b7280;
      }

      /* スマホ対応CSS - LINE風UI */
      @media (max-width: 767px) {
        body { padding: 0; }
        .container {
          height: 100vh;
          padding: 0;
          border-radius: 0;
        }
        .container > div { flex-direction: column; }
        #appContainer { flex-direction: column; position: relative; }

        #sidebar {
          width: 100% !important;
          height: 100%;
          position: absolute;
          top: 0; left: 0;
          z-index: 10;
          background: white;
        }
        #resizer { display: none; }
        #membersSidebar { display: none; }

        /* サイドバーが非表示時はチャットエリアがフル表示 */
        #sidebar.mobile-hidden { display: none !important; }

        #roomList {
          flex: 1;
          overflow-y: auto;
          border-bottom: none;
        }
        #messagesDisplay {
          flex: 1;
          min-height: 0;
        }
        .my-message, .other-message { max-width: 85%; }
        
        /* スマホではユーザーパネルを大きく */
        #userPanel {
            padding: 1rem;
        }

        /* スマホ用の戻るボタン */
        #mobileBackButton {
          display: flex !important;
        }

        /* スマホで入力欄を画面下部に固定 */
        #messageInputArea {
          border-top: 1px solid #e5e7eb;
        }

        /* iPhoneでの勝手なズーム拡大を防止 */
        input, textarea, select {
          font-size: 16px !important;
        }

        /* メンバー一覧のボトムシート対応 */
        #bottomSheetOverlay {
          display: none;
          position: fixed;
          inset: 0;
          background-color: rgba(0,0,0,0.5);
          z-index: 40;
          opacity: 0;
          transition: opacity 0.3s ease;
        }
        #bottomSheetOverlay.show {
          display: block;
          opacity: 1;
        }

        #membersSidebar {
          display: flex !important; /* Tailwindの hidden md:flex を上書き */
          position: fixed;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 70vh;
          background-color: white;
          z-index: 50;
          border-radius: 1rem 1rem 0 0;
          box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
          transform: translateY(100%);
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          flex-direction: column;
          border-left: none; /* PC用のボーダーを消す */
        }
        
        #membersSidebar.bottom-sheet-open {
          transform: translateY(0);
        }

        /* ボトムシートのドラッグハンドル */
        #bottomSheetHandle {
          display: flex;
          justify-content: center;
          padding: 12px 0;
          cursor: pointer;
          flex-shrink: 0;
        }
        #bottomSheetHandle::after {
          content: "";
          width: 40px;
          height: 5px;
          background-color: #d1d5db;
          border-radius: 3px;
        }
      }
      @media (min-width: 768px) {
        #mobileBackButton { display: none !important; }
        #bottomSheetOverlay { display: none !important; }
        #bottomSheetHandle { display: none !important; }
      }

      /* 強制上書き */
      html, body {
        height: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      .container {
        width: 100% !important;
        max-width: none !important;
        height: 100vh !important;
        min-height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
      }
      /* --- 追加機能用スタイル --- */
      /* メンションのハイライト */
      .mention-highlight {
        background-color: #fef08a !important;
        border: 1px solid #eab308;
      }
      .mention-text {
        color: #1d4ed8;
        font-weight: bold;
      }
      /* ピン留めエリア */
      #pinnedMessagesArea {
        border-bottom: 2px solid #e5e7eb;
        background-color: #f8fafc;
        padding: 0.5rem;
        max-height: 120px;
        overflow-y: auto;
      }
      .pinned-message-item {
        font-size: 0.8rem;
        padding: 6px;
        background: white;
        border-radius: 4px;
        margin-bottom: 4px;
        border-left: 4px solid #f59e0b;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      .pinned-message-item:hover { background-color: #f1f5f9; }
      /* 未読バッジ */
      .unread-badge {
        background-color: #ef4444;
        color: white;
        font-size: 0.7rem;
        font-weight: 700;
        min-width: 18px;
        height: 18px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 5px;
        margin-left: 6px;
        flex-shrink: 0;
      }
      /* 検索バー */
      #searchContainer {
        padding: 0.5rem;
        background: #f3f4f6;
        border-bottom: 1px solid #e5e7eb;
      }
      #searchContainer input {
        background-color: #fff;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        color: #374151;
        font-size: 16px; /* スマホでの自動拡大防止のため16pxに固定 */
        padding: 0.5rem 0.75rem;
      }
      #searchContainer input:focus {
        border-color: #9ca3af;
        outline: none;
      }
      /* ドラッグ＆ドロップオーバーレイ */
      #dropOverlay {
        position: absolute;
        inset: 0;
        background-color: rgba(255, 255, 255, 0.92);
        border: 2px dashed #000;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      #dropOverlay.active {
        display: flex;
      }
      /* 入力欄アクションボタン */
      .input-action-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        font-size: 1rem;
        padding: 6px 8px;
        border-radius: 4px;
        transition: color 0.15s, background-color 0.15s;
      }
      .input-action-btn:hover:not(:disabled) {
        color: #000;
        background-color: #f0f0f0;
      }
      .input-action-btn:disabled {
        color: #ccc;
        cursor: not-allowed;
      }
      /* メンションポップアップ */
      #mentionPopup {
        position: absolute;
        bottom: 100%;
        left: 0;
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        max-height: 180px;
        overflow-y: auto;
        z-index: 30;
        width: 220px;
        margin-bottom: 8px;
      }
      #mentionPopup .mention-option {
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.875rem;
        color: #374151;
        border-bottom: 1px solid #f3f4f6;
        transition: background-color 0.2s;
      }
      #mentionPopup .mention-option:last-child {
        border-bottom: none;
      }
      #mentionPopup .mention-option:hover {
        background-color: #f3f4f6;
      }
      /* === アップデートオーバーレイ === */
      #updateOverlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: none;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e3a5f 100%);
        flex-direction: column;
      }
      #updateOverlay.show {
        display: flex;
      }
      .update-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        padding: 3rem;
        max-width: 440px;
        width: 90%;
        text-align: center;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        animation: updateCardFadeIn 0.6s ease-out;
      }
      @keyframes updateCardFadeIn {
        from { opacity: 0; transform: translateY(30px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .update-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
        color: white;
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
      }
      .update-title {
        color: white;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .update-version {
        color: #93c5fd;
        font-size: 0.95rem;
        margin-bottom: 1.25rem;
      }
      .update-body {
        color: #cbd5e1;
        font-size: 0.85rem;
        line-height: 1.6;
        margin-bottom: 2rem;
        max-height: 120px;
        overflow-y: auto;
        text-align: left;
        padding: 0.75rem;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 0.75rem;
      }
      .update-btn {
        width: 100%;
        padding: 0.9rem;
        border: none;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: white;
        box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
      }
      .update-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.5);
      }
      .update-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .update-progress {
        margin-top: 1rem;
        color: #93c5fd;
        font-size: 0.85rem;
        display: none;
      }
      .update-progress.show {
        display: block;
      }
      .update-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #93c5fd;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* === カスタム通知UI（LINE風） === */
      #customNotificationContainer {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column-reverse;
        gap: 10px;
        pointer-events: none;
      }
      .custom-notif {
        width: 360px;
        max-width: calc(100vw - 40px);
        background: white;
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.08);
        padding: 16px 18px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        pointer-events: auto;
        cursor: pointer;
        transform: translateY(120%) scale(0.95);
        opacity: 0;
        animation: notifSlideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        transition: transform 0.3s ease, opacity 0.3s ease;
        border-left: 4px solid #3b82f6;
        -webkit-user-select: none;
        user-select: none;
      }
      .custom-notif.dismissing {
        animation: notifSlideDown 0.35s ease forwards;
      }
      @keyframes notifSlideUp {
        from { transform: translateY(120%) scale(0.95); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes notifSlideDown {
        from { transform: translateY(0) scale(1); opacity: 1; }
        to { transform: translateY(120%) scale(0.95); opacity: 0; }
      }
      .custom-notif-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.1rem;
        flex-shrink: 0;
      }
      .custom-notif-content {
        flex: 1;
        min-width: 0;
      }
      .custom-notif-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .custom-notif-body {
        font-size: 0.8rem;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .custom-notif-time {
        font-size: 0.65rem;
        color: #9ca3af;
        margin-top: 4px;
      }
      .custom-notif-close {
        background: none;
        border: none;

      avatarUploadInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(ev) {
              const img = new Image();
              img.onload = function() {
                  const canvas = document.createElement('canvas');
                  const size = 150; // 最大サイズ
                  let width = img.width, height = img.height;
                  if (width > height) { if (width > size) { height *= size / width; width = size; } }
                  else { if (height > size) { width *= size / height; height = size; } }
                  canvas.width = width; canvas.height = height;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, width, height);
                  pendingAvatarUrl = canvas.toDataURL('image/jpeg', 0.8); // 圧縮
                  settingsAvatarPreview.src = pendingAvatarUrl;
                  settingsAvatarPreview.classList.remove("hidden");
                  document.getElementById("resetAvatarButton").classList.remove("hidden");

        if (awayTimer) {
            clearTimeout(awayTimer);
            awayTimer = null;
        }
      }
      
      function startPresenceSystem() {
        updateUserStatus('online');
        resetAwayTimer();
        document.addEventListener("visibilitychange", handleVisibilityChange);
        window.addEventListener("beforeunload", handlePageClose);
        window.addEventListener("pagehide", handlePageClose);  // Safari/iPad対応
        window.addEventListener('focus', handleFocus);
        window.addEventListener('blur', handleBlur);
        subscribeToUserStatus();
        
        if(memberListRefreshInterval) clearInterval(memberListRefreshInterval);
        memberListRefreshInterval = setInterval(() => {
            renderMembersList(cachedUsers);
        }, 60000);
      }

      function stopPresenceSystem() {
        stopAwayTimer();
        if(memberListRefreshInterval) {
            clearInterval(memberListRefreshInterval);
            memberListRefreshInterval = null;
        }
        document.removeEventListener("visibilitychange", handleVisibilityChange);
        window.removeEventListener("beforeunload", handlePageClose);
        window.removeEventListener("pagehide", handlePageClose);
        window.removeEventListener('focus', handleFocus);
        window.removeEventListener('blur', handleBlur);
        if (unsubscribeUserStatus) {
          unsubscribeUserStatus();
          unsubscribeUserStatus = null;
        }
      }
      
      const handleFocus = () => {
        updateUserStatus('online');
        resetAwayTimer();
      };
      const handleBlur = () => {
        updateUserStatus('offline');
        stopAwayTimer();
      };
      const handleVisibilityChange = () => {
        if (document.visibilityState === 'hidden') {
            // hidden時もsendBeaconで確実にオフライン化
            sendOfflineBeacon();
            updateUserStatus('offline');
            stopAwayTimer();
        } else {
            updateUserStatus('online');
            resetAwayTimer();
        }
      };

      // タブ閉じ・ページ離脱時の確実なオフライン化
      // beforeunload (Chrome/Firefox) + pagehide (Safari/iPad) の両方をリスン
      const handlePageClose = (e) => {
        sendOfflineBeacon();
      };

      // navigator.sendBeacon でCloudflare Worker経由で確実にオフライン化
      // Firestoreの非同期書き込みはタブ閉じ時に完了しないが、
      // sendBeaconはブラウザがバックグラウンドでHTTP POSTを送信するため確実
      function sendOfflineBeacon() {
        if (!userId || !sessionId) return;
        const url = 'https://simplechat-api.astro-fray-server.workers.dev/api/setOffline';
        const data = JSON.stringify({ userId, sessionId, appId });
        try {
          if (navigator.sendBeacon) {
            navigator.sendBeacon(url, new Blob([data], { type: 'application/json' }));
          } else {
            // sendBeacon非対応のフォールバック（同期XHR）
            const xhr = new XMLHttpRequest();
            xhr.open('POST', url, false); // 同期
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(data);
          }
        } catch (e) {
          console.error('sendOfflineBeacon error:', e);
        }
      }

      async function updateUserStatus(state) {
        if (!userId || !userNickname) return;
        
        let computedState = state;
        const statusRef = doc(db, `artifacts/${appId}/status`, userId);
        try {
          let updateData = {
            last_changed: serverTimestamp(),
            nickname: userNickname,
            avatarUrl: userAvatarUrl || null,
            currentRoomId: currentRoomId,
          };
          
          if (state === 'offline') {
              updateData.activeSessions = arrayRemove(sessionId);
          } else {
              updateData.activeSessions = arrayUnion(sessionId);
              updateData.state = state;
          }
          await setDoc(statusRef, updateData, { merge: true });
        } catch (error) {
          console.error("Status update error:", error);
        }
      }

      function subscribeToUserStatus() {
        if (unsubscribeUserStatus) unsubscribeUserStatus();
        
        const statusQuery = query(collection(db, `artifacts/${appId}/status`));
        unsubscribeUserStatus = onSnapshot(statusQuery, (snapshot) => {
            cachedUsers = [];
            snapshot.forEach((doc) => {
                cachedUsers.push({ id: doc.id, ...doc.data() });
            });
            renderMembersList(cachedUsers);
        }, (error) => {
            console.error("メンバーリストの購読エラー:", error);
            membersList.innerHTML = `<div class="p-4 text-xs text-red-600">メンバーを読み込めません。</div>`;
        });
      }
      
      function renderMembersList(users) {
        if (!membersList) return;
        membersList.innerHTML = "";
        
        const processedUsers = users.map(u => {
            const isOnline = u.activeSessions && u.activeSessions.length > 0;
            const computedState = isOnline ? (u.state || 'online') : 'offline';
            
            // update own UI status indicator here
            if (u.id === userId) {
                const statusElement = document.getElementById('userPanelStatus');
                if (statusElement) statusElement.className = `status-indicator status-${computedState}`;
            }
            return { ...u, computedState };
        });
        
        const onlineMembers = processedUsers.filter(u => u.computedState === 'online');
        const awayMembers = processedUsers.filter(u => u.computedState === 'away');
        const offlineMembers = processedUsers.filter(u => u.computedState === 'offline');

        onlineMembers.sort((a, b) => (a.nickname || "").localeCompare(b.nickname || ""));
        awayMembers.sort((a, b) => (a.nickname || "").localeCompare(b.nickname || ""));
        offlineMembers.sort((a, b) => (a.nickname || "").localeCompare(b.nickname || ""));

        const createGroup = (title, members) => {
          if (members.length === 0) return;
          
          const titleDiv = document.createElement("div");
          titleDiv.className = "member-group-title";
          titleDiv.textContent = `${title} — ${members.length}`;
          membersList.appendChild(titleDiv);

          members.forEach(member => {
            const item = document.createElement("div");
            item.className = "member-item";

            const avatar = document.createElement("div");
            avatar.className = "avatar-placeholder";
            if (member.avatarUrl) {
                const avatarImg = document.createElement("img");
                avatarImg.src = member.avatarUrl;
                avatarImg.alt = member.nickname || "";
                avatar.appendChild(avatarImg);
            } else {
                avatar.textContent = (member.nickname || " ").charAt(0).toUpperCase();
            }

            const statusDot = document.createElement("div");
            statusDot.className = `status-indicator status-${member.computedState}`;
            avatar.appendChild(statusDot);

            const info = document.createElement("div");
            info.className = "member-info";

            const name = document.createElement("div");
            name.className = "member-name";
            name.textContent = member.nickname || "不明なユーザー";
            info.appendChild(name);

            if (member.state === 'away') {
                const statusText = document.createElement("div");
                statusText.className = "member-status-text";
                statusText.textContent = "離席中";
                info.appendChild(statusText);
            } else if (member.state === 'offline') {
                const statusText = document.createElement("div");
                statusText.className = "member-status-text";
                statusText.textContent = formatTimeAgo(member.last_changed);
                info.appendChild(statusText);
            }

            item.appendChild(avatar);
            item.appendChild(info);
            membersList.appendChild(item);
          });
        };

        createGroup("Online", onlineMembers);
        createGroup("Away", awayMembers);
        createGroup("Offline", offlineMembers);
      }

      function formatTimeAgo(timestamp) {
        if (!timestamp || !timestamp.toDate) return "";
        const now = new Date();
        const past = timestamp.toDate();
        const diffInSeconds = Math.floor((now - past) / 1000);

        if (diffInSeconds < 60) return `数秒前`;
        const diffInMinutes = Math.floor(diffInSeconds / 60);
        if (diffInMinutes < 60) return `${diffInMinutes}分前`;
        const diffInHours = Math.floor(diffInMinutes / 60);
        if (diffInHours < 24) return `${diffInHours}時間前`;
        const diffInDays = Math.floor(diffInHours / 24);
        return `${diffInDays}日前`;
      }

      // Room Features

        onSnapshot(roomsQuery, (snapshot) => {

            btn.className = "text-gray-700 w-10 h-10 text-lg hover:bg-gray-200 rounded-full flex items-center justify-center -mr-2 -my-2";

            div.appendChild(nameDiv);
            div.appendChild(badgeSpan);

              setupUnreadListener(doc.id);
            }
          });
          // 削除されたルームのリスナーを解除
          Object.keys(unreadListeners).forEach(rid => {
            if (!currentRoomIds.has(rid)) {
              unreadListeners[rid]();
              delete unreadListeners[rid];
              delete unreadCounts[rid];
            }
          });
        });

        document.addEventListener("click", (e) => {
            if(!e.target.closest(".dropdown-container")) {
                document.querySelectorAll(".dropdown-content").forEach(d => d.style.display="none");

      function setupUnreadListener(roomId) {
        const q = query(
          collection(db, `artifacts/${appId}/public/data/rooms/${roomId}/messages`),
          orderBy("timestamp", "desc"),
          limit(1)
        );
        let isFirst = true;
        unreadListeners[roomId] = onSnapshot(q, (snapshot) => {
          if (isFirst) { isFirst = false; return; } // 初回は無視
          snapshot.docChanges().forEach(change => {
            if (change.type === "added") {
              const msgData = change.doc.data();
              if (roomId !== currentRoomId && msgData.senderId !== userId) {
                unreadCounts[roomId] = (unreadCounts[roomId] || 0) + 1;
                updateUnreadBadge(roomId);
              }
            }
          });
        });
      }

      function updateUnreadBadge(roomId) {
        const badge = document.getElementById(`unread-badge-${roomId}`);
        if (!badge) return;
        const count = unreadCounts[roomId] || 0;
        badge.textContent = count > 99 ? "99+" : count;
        badge.style.display = (count > 0 && roomId !== currentRoomId) ? "flex" : "none";
      }

      function subscribeToMessages() {
          if(unsubscribeMessages) unsubscribeMessages();
          
          const oldScrollHeight = messagesDisplay.scrollHeight;
          // 最新のメッセージから limit 件取得するために desc を使用
          const q = query(collection(db, `artifacts/${appId}/public/data/rooms/${currentRoomId}/messages`), orderBy("timestamp", "desc"), limit(messageLimit));
          
          unsubscribeMessages = onSnapshot(q, (snapshot) => {
              snapshot.docChanges().forEach(change => {
                  if(change.type === "added" && !isInitialMessageLoad && !isScrollingUpLoad) {
                      const msgData = change.doc.data();
                      if(msgData.senderId !== userId) {
                          const isMentioned = msgData.text && msgData.text.includes(`@${userNickname}`);
                          if (!document.hasFocus() || isMentioned) {
                              showNotification("チャット通知", `${msgData.senderNickname}: ${msgData.text || "画像・ファイルを送信しました"}`, currentRoomId);
                          }
                      }
                  }
              });

              messagesDisplay.innerHTML = "";
              const newMessages = [];
              snapshot.forEach(doc => {
                  const d = doc.data(); d.id = doc.id;
                  newMessages.push(d);
              });
              // 取得したリスト（新しい順）を反転させて、古い順（通常表示）にする
              lastMessagesData = newMessages.reverse();
              
              messagesIndexMap = {};
              lastMessagesData.forEach((m, i) => messagesIndexMap[m.id] = i);
              
              renderPinnedMessages();
              renderMessagesWithReadReceipts();
              
              if (isInitialMessageLoad) {
                  messagesDisplay.scrollTop = messagesDisplay.scrollHeight;
                  isInitialMessageLoad = false;
              } else if (isScrollingUpLoad) {
                  // スクロールで過去を読み込んだ場合、位置をキープする
                  messagesDisplay.scrollTop = messagesDisplay.scrollHeight - oldScrollHeight;
                  isScrollingUpLoad = false;
              }
              updateReadReceiptForCurrentUser();
          });
      }

      function selectRoom(roomId, roomName) {
        // スマホの場合、同じルームをタップしてもチャット画面に遷移（サイドバーを隠す）させる
        if (window.innerWidth < 768 && currentRoomId === roomId) {
          sidebar.classList.add("mobile-hidden");
          currentRoomHeader.classList.remove("hidden");
          return;
        }
        
        if(currentRoomId === roomId) return;
        currentRoomId = roomId;
        updateUserStatus('online'); // Sync room selection for notifications
        currentRoomTitleText.textContent = roomName;
        currentRoomHeader.classList.remove("hidden");
        messagesDisplay.innerHTML = "";
        lastMessagesData = [];
        messageInput.disabled = false;
        fileAttachButton.disabled = false;
        mentionButton.disabled = false;
        messageLimit = 20; // ルームに入り直したらリミットをリセット
        clearAttachedFile();
        cancelReply();
        
        // 未読バッジをクリア
        unreadCounts[roomId] = 0;
        updateUnreadBadge(roomId);

        // スマホ: サイドバーを隠してチャットを表示
        if (window.innerWidth < 768) {
          sidebar.classList.add("mobile-hidden");
        }
        
        if(readReceiptsUnsubscribe) readReceiptsUnsubscribe();

        isInitialMessageLoad = true;
        isScrollingUpLoad = false;
        
        subscribeToMessages();

        const rrRef = collection(db, `artifacts/${appId}/public/data/rooms/${currentRoomId}/readReceipts`);
        readReceiptsUnsubscribe = onSnapshot(rrRef, (snap) => {
            roomReadReceipts = {};
            snap.forEach(d => roomReadReceipts[d.id] = d.data());
            renderMessagesWithReadReceipts();
        });
        
        membersSidebar.classList.remove("hidden");
      }

      // スクロールを検知して過去のメッセージを読み込むリスナー
      messagesDisplay.addEventListener("scroll", () => {
          if (messagesDisplay.scrollTop === 0 && lastMessagesData.length >= messageLimit) {
              messageLimit += 20;
              isScrollingUpLoad = true;
              subscribeToMessages();
          }
      });

      async function deleteRoomAndMessages(roomId) {
        if (currentRoomId === roomId) {
          currentRoomId = null;
          updateUserStatus('online');
          currentRoomHeader.classList.add("hidden");
          messagesDisplay.innerHTML = "";
          messageInput.disabled = true;
          if (unsubscribeMessages) unsubscribeMessages();
          if (readReceiptsUnsubscribe) readReceiptsUnsubscribe();
        }

        try {
          const batch = writeBatch(db);

          // 1. messages サブコレクションの全削除
          const messagesRef = collection(db, `artifacts/${appId}/public/data/rooms/${roomId}/messages`);
          const messagesSnap = await getDocs(messagesRef);
          messagesSnap.forEach((docSnap) => {
            batch.delete(docSnap.ref);
          });

          // 2. readReceipts サブコレクションの全削除
          const readReceiptsRef = collection(db, `artifacts/${appId}/public/data/rooms/${roomId}/readReceipts`);
          const readReceiptsSnap = await getDocs(readReceiptsRef);
          readReceiptsSnap.forEach((docSnap) => {
            batch.delete(docSnap.ref);
          });

          // 3. ルーム本体の削除
          const roomRef = doc(db, `artifacts/${appId}/public/data/rooms`, roomId);
          batch.delete(roomRef);

          await batch.commit();
          console.log(`Successfully deleted room document and all its subcollections for ${roomId}.`);
        } catch (error) {
          console.error("Error during room deletion process:", error);
          throw error;
        }
      }
      const executeDeleteRoom = async () => {

          alertMessage(`ルーム「${pendingRoomDelete.roomName}」を削除しました。`, "success");

          alertMessage("ルームの削除に失敗しました。", "error");
        } finally {
          loadingOverlay.classList.add("hidden");
          pendingRoomDelete = null;
        }
      };
      
      async function sendMessage() {
          const text = messageInput.value.trim();
          if((!text && !attachedFile) || !currentRoomId) return;
          
          loadingOverlay.classList.remove("hidden");
          try {
              const data = { text, senderId: userId, senderNickname: userNickname, timestamp: serverTimestamp() };
              if(attachedFile) {
                  Object.assign(data, { fileData: attachedFile.data, fileName: attachedFile.name, fileType: attachedFile.type, fileSize: attachedFile.size });
              }
              if(replyingToMessage) {
                  data.replyTo = { messageId: replyingToMessage.id, senderNickname: replyingToMessage.senderNickname, text: replyingToMessage.text || "（ファイル）" };
              }
              await addDoc(collection(db, `artifacts/${appId}/public/data/rooms/${currentRoomId}/messages`), data);

              // 通知を送信
              try {
                  const roomDoc = await getDoc(doc(db, `artifacts/${appId}/public/data/rooms`, currentRoomId));
                  let receiverIds = [];
                  if (roomDoc.exists()) {
                      const roomData = roomDoc.data();
                      if (roomData.hasPassword && roomData.joinedUsers) {
                          receiverIds = roomData.joinedUsers;
                      } else {
                          // 全てのユーザーを取得
                          const allUsersSnap = await getDocs(collection(db, `artifacts/${appId}/users`));
                          receiverIds = allUsersSnap.docs.map(d => d.id);
                      }
                  }
                  
                  if (receiverIds.length > 0) {
                      fetch("https://simplechat-api.astro-fray-server.workers.dev/api/sendNotification", {
                          method: "POST",
                          headers: { "Content-Type": "application/json" },
                          body: JSON.stringify({
                              receiverIds: receiverIds,
                              title: `${roomDoc.data()?.name || 'Room'}`,
                              body: `${userNickname}: ${text || (attachedFile ? '（ファイル）' : '')}`,
                              roomId: currentRoomId,
                              appId: appId,
                              senderId: userId
                          })
                      }).catch(e => console.error("Notification trigger error:", e));
                  }
              } catch (notifyErr) {
                  console.error("Failed to trigger notification:", notifyErr);
              }

              messageInput.value = ""; messageInput.style.height="auto";
              clearAttachedFile(); cancelReply();
              
              // ★ メッセージ送信時にオンラインにし、タイマーをリセット
              updateUserStatus('online');
              resetAwayTimer();

          } catch(e) { 
              console.error(e);
              alertMessage("送信に失敗しました", "error");
          } finally {
              loadingOverlay.classList.add("hidden");
          }
      }
      messageInput.addEventListener("keydown", (e) => {
          if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      messageInput.addEventListener("input", () => {
          messageInput.style.height = "auto";
          messageInput.style.height = messageInput.scrollHeight + "px";
      });
      
      messageInput.addEventListener("paste", (e) => {
          const items = (e.clipboardData || e.originalEvent.clipboardData).items;
          for(let i=0; i<items.length; i++) {
              if(items[i].kind === 'file') {
                  const f = items[i].getAsFile();
                  if(f.size > 1024*1024) { alertMessage("ファイルは1MBまでです", "error"); return; }
                  const reader = new FileReader();
                  reader.onload = (ev) => {

      function escapeHtmlAndLinkUrls(text) {
        if (!text) return "";
        let escapedText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        escapedText = escapedText.replace(urlRegex, `<a href="$1" target="_blank" rel="noopener noreferrer" style="color: black; text-decoration: underline;">$1</a>`);
        // メンションの置換 (@ユーザー名)
        const mentionRegex = /@([^\s]+)/g;
        escapedText = escapedText.replace(mentionRegex, (match, p1) => {
            return `<span class="mention-text">@${p1}</span>`;
        });
        return escapedText;
      }

        messageElement.appendChild(senderNicknameSpan);
        if (message.replyTo && message.replyTo.messageId) {

        filteredMessages.forEach((msg) => {

      function computeReadByCount(message, msgIndex) {
        let count = 0;
        Object.entries(roomReadReceipts).forEach(([rid, receipt]) => {
          if (!rid || rid === message.senderId) return;
          if (receipt.lastReadMessageId && messagesIndexMap[receipt.lastReadMessageId] >= msgIndex) count++;
          else if (receipt.lastReadAt && message.timestamp && receipt.lastReadAt.toMillis() >= message.timestamp.toMillis()) count++;
        });
        return count;
      }

      function downloadFile(base64Data, fileName, mimeType) {
        try {
          const parts = base64Data.split(';base64,');
          const byteCharacters = atob(parts[1]);
          const byteNumbers = new Array(byteCharacters.length);
          for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
          }
          const byteArray = new Uint8Array(byteNumbers);
          const blob = new Blob([byteArray], {type: mimeType});
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } catch(e) { console.error(e); }
      }

                  console.log('FCM Token obtained:', token.substring(0, 20) + '...');
                  const userRef = doc(db, `artifacts/${appId}/users`, userId);
                  await setDoc(userRef, { fcmTokens: arrayUnion(token) }, { merge: true });
                }
              } catch (tokenErr) {
                console.error('FCM Token error:', tokenErr);
              }
            }
          }

          // フォアグラウンドメッセージ受信（data + notification 両対応）
          onMessage(messaging, (payload) => {
            console.log('Foreground message received:', payload);
            const title = payload.data?.title || payload.notification?.title || 'SimpleChat';
            const body = payload.data?.body || payload.notification?.body || '新しいメッセージ';
            const roomId = payload.data?.roomId || null;
            showNotification(title, body, roomId);
          });
        } catch (error) {
          console.error('FCM Initialization Error:', error);
        }
      }

      // =========================================================================
      // Sidebar Resizing Feature - ★改善版に置き換え
      // =========================================================================
      function initializeResizer() {
      const sidebar = document.getElementById("sidebar");
      const resizer = document.getElementById("resizer");
        const SIDEBAR_WIDTH_KEY = "chatAppSidebarWidth";

        const savedWidth = localStorage.getItem(SIDEBAR_WIDTH_KEY);
        if (savedWidth) {
          sidebar.style.width = savedWidth;
        }

      let isResizing = false;

        resizer.addEventListener("mousedown", (e) => {
          isResizing = true;
          document.body.style.userSelect = "none";
          document.addEventListener("mousemove", handleMouseMove);
          document.addEventListener("mouseup", handleMouseUp);
        });

        function handleMouseMove(e) {
          if (isResizing) {
            const newWidth = Math.max(180, Math.min(600, e.clientX));
            sidebar.style.width = `${newWidth}px`;
          }
        }

        function handleMouseUp() {
          isResizing = false;
          document.body.style.userSelect = "";
          document.removeEventListener("mousemove", handleMouseMove);
          document.removeEventListener("mouseup", handleMouseUp);
          localStorage.setItem(SIDEBAR_WIDTH_KEY, sidebar.style.width);
        }
      }

      // =========================================================================
      // Notifications & Updater
      // =========================================================================

      // --- LINE風カスタム通知（Tauri Windows版用）---
      function showCustomNotification(title, body, roomId) {
        const container = document.getElementById('customNotificationContainer');
        if (!container) return;

        // 通知音を鳴らす
        try { notificationSound.currentTime = 0; notificationSound.play(); } catch(e) {}

        const notif = document.createElement('div');
        notif.className = 'custom-notif';
        notif.innerHTML = `
          <div class="custom-notif-icon"><i class="fas fa-comment-dots"></i></div>
          <div class="custom-notif-content">
            <div class="custom-notif-title">${escapeHtml(title)}</div>
            <div class="custom-notif-body">${escapeHtml(body)}</div>
            <div class="custom-notif-time">たった今</div>
          </div>
          <button class="custom-notif-close" onclick="event.stopPropagation(); dismissNotification(this.parentElement)">
            <i class="fas fa-times"></i>
          </button>
        `;

        // クリックで該当ルームに移動
        notif.addEventListener('click', () => {
          if (roomId) {
            // ルームIDに対応するルーム名を見つけてselectRoomを呼ぶ
            const roomItem = document.getElementById(`room-item-${roomId}`);
            if (roomItem) roomItem.click();
          }
          dismissNotification(notif);
        });

        container.appendChild(notif);

        // 最大3件まで表示
        while (container.children.length > 3) {
          const oldest = container.children[container.children.length - 1];
          oldest.remove();
        }

        // 5秒後に自動的に消える
        setTimeout(() => {
          if (notif.parentElement) dismissNotification(notif);
        }, 5000);
      }

      // 通知を閉じるアニメーション
      window.dismissNotification = function(el) {
        el.classList.add('dismissing');
        setTimeout(() => el.remove(), 350);
      };

      // HTMLエスケープ
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // --- 統合通知関数 ---
      async function showNotification(title, body, roomId) {
        if (isTauri) {
          // Windows版: LINE風カスタムUI通知（最前面・独自UI）
          showCustomNotification(title, body, roomId);
        } else if ('Notification' in window) {
          // Web/PWA版: ブラウザ標準通知
          if (Notification.permission === 'granted') {
            new Notification(title, { body: body, icon: '/icon-192x192.png', tag: roomId || 'simplechat' });
          } else if (Notification.permission !== 'denied') {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
              new Notification(title, { body: body, icon: '/icon-192x192.png', tag: roomId || 'simplechat' });
            }
          }
        }
      }

      // --- ブロッキングアップデートチェック ---
      let pendingUpdate = null;

      async function blockingUpdateCheck() {
        if (!isTauri) return false;
        // Tauri v2 updater API
        const updater = window.__TAURI__?.updater;
        if (!updater) return false;

        try {
          console.log('Checking for updates...');
          const update = await updater.check();
          if (update) {
            console.log('Update available:', update.version);
            pendingUpdate = update;

            // アップデートオーバーレイを表示
            const overlay = document.getElementById('updateOverlay');
            const versionText = document.getElementById('updateVersionText');
            const bodyText = document.getElementById('updateBodyText');
            
            versionText.textContent = `v${update.version} が利用可能です`;
            bodyText.textContent = update.body || 'バグ修正とパフォーマンス改善が含まれています。';
            overlay.classList.add('show');

            return true; // アプリ起動をブロック
          }
          console.log('No updates available.');
        } catch (error) {
          console.error('Update check failed:', error);
        }
        return false;
      }

      // アップデート実行（HTMLのonclickから呼ばれる）
      window.performUpdate = async function() {
        if (!pendingUpdate) return;
        const btn = document.getElementById('updateButton');
        const progress = document.getElementById('updateProgress');
        const progressText = document.getElementById('updateProgressText');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp;&nbsp;ダウンロード中...';
        progress.classList.add('show');
        progressText.textContent = 'ダウンロードしてインストール中...';

        try {
          await pendingUpdate.downloadAndInstall();
          progressText.textContent = 'インストール完了！アプリを再起動してください。';
          btn.innerHTML = '<i class="fas fa-redo"></i>&nbsp;&nbsp;再起動が必要です';
          // 少し待ってからリロード（Tauri v2ではprocess pluginがないとrestartできないので）
          setTimeout(() => {
            window.location.reload();
          }, 2000);
        } catch (error) {
          console.error('Update failed:', error);
          progressText.textContent = 'アップデートに失敗しました。後でもう一度お試しください。';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-download"></i>&nbsp;&nbsp;もう一度試す';
        }
      };

      // =========================================================================
      // Application Startup
      // =========================================================================
      window.onload = async () => {
          loadingOverlay.classList.remove('hidden');

          // Tauri版: まずアップデートチェック（ブロッキング）
          const hasUpdate = await blockingUpdateCheck();
          if (hasUpdate) {
            // アップデートがある場合、オーバーレイを表示したまま
            // Firebase初期化はしない（ユーザーにアプデを促す）
            loadingOverlay.classList.add('hidden');
            return;
          }

          // アップデートがない場合、通常起動
          initializeFirebase();
          if ('Notification' in window) Notification.requestPermission();
          initializeResizer();
      };
    </script>
  </body>
</html>
