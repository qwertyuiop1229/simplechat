<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      /* transparent(true) を Rust 側で外したため、body に明示的な背景色を置く */
      background: #ffffff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      /* 細いボーダーで枠を視認可能に（角丸の代わり） */
      border: 1px solid #e5e7eb;
      box-sizing: border-box;
    }
    .custom-notif {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: white;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      border-left: 4px solid #3b82f6;
      user-select: none;
      -webkit-user-select: none;
      animation: notifSlideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .custom-notif.dismissing {
      animation: notifSlideDown 0.35s ease forwards;
    }
    @keyframes notifSlideUp {
      from { transform: translateY(120%) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes notifSlideDown {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(120%) scale(0.95); opacity: 0; }
    }
    .custom-notif-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .custom-notif-content {
      flex: 1;
      min-width: 0;
    }
    .custom-notif-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .custom-notif-body {
      font-size: 0.8rem;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .custom-notif-time {
      font-size: 0.65rem;
      color: #9ca3af;
      margin-top: 4px;
    }
    .custom-notif-close {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s, background-color 0.15s;
    }
    .custom-notif-close:hover {
      color: #374151;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="custom-notif" id="notifBox">
    <div class="custom-notif-icon"><i class="fas fa-comment-dots"></i></div>
    <div class="custom-notif-content">
      <div class="custom-notif-title" id="notifTitle">通知</div>
      <div class="custom-notif-body" id="notifBody">メッセージ</div>
      <div class="custom-notif-time">たった今</div>
    </div>
    <button class="custom-notif-close" id="closeBtn">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || '通知';
    const body = params.get('body') || '';
    const roomId = params.get('roomId') || '';
    const id = params.get('id') || '';

    document.getElementById('notifTitle').textContent = title;
    document.getElementById('notifBody').textContent = body;

    const { invoke } = window.__TAURI__.core;
    const { emit, listen } = window.__TAURI__.event;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
    const appWindow = getCurrentWebviewWindow();

    // PhysicalPosition を取得（Tauri v2 DPI モジュールから、なければ互換オブジェクト）
    function makePhysPos(x, y) {
      const dpi = window.__TAURI__?.dpi;
      if (dpi?.PhysicalPosition) return new dpi.PhysicalPosition(x, y);
      return { type: 'Physical', x, y };
    }

    // 既存通知を上にスライドさせるアニメーション（Rustからのmove-toイベントで呼ばれる）
    let animating = false;
    async function animateTo(tx, ty) {
      if (animating) return;
      animating = true;
      try {
        const pos = await appWindow.position();
        const sx = pos.x, sy = pos.y;
        if (Math.abs(sx - tx) < 2 && Math.abs(sy - ty) < 2) { animating = false; return; }
        const dur = 280;
        const t0 = performance.now();
        function step(now) {
          const t = Math.min((now - t0) / dur, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          appWindow.setPosition(makePhysPos(
            Math.round(sx + (tx - sx) * ease),
            Math.round(sy + (ty - sy) * ease)
          )).catch(() => {});
          if (t < 1) { requestAnimationFrame(step); }
          else { animating = false; }
        }
        requestAnimationFrame(step);
      } catch(e) { animating = false; }
    }

    listen('move-to', (event) => {
      animateTo(event.payload.x, event.payload.y);
    }).catch(console.error);

    async function dismissAndClose() {
      document.getElementById('notifBox').classList.add('dismissing');
      setTimeout(async () => {
        await invoke('close_notification', { label: appWindow.label });
      }, 350);
    }

    document.getElementById('closeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      dismissAndClose();
    });

    document.getElementById('notifBox').addEventListener('click', () => {
      if (roomId) {
        emit('open-room', { roomId: roomId });
      }
      dismissAndClose();
    });

    setTimeout(dismissAndClose, 5000);
  </script>
</body>
</html>
