<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .custom-notif {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.08);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      border-left: 4px solid #3b82f6;
      user-select: none;
      -webkit-user-select: none;
      animation: notifSlideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .custom-notif.dismissing {
      animation: notifSlideDown 0.35s ease forwards;
    }
    @keyframes notifSlideUp {
      from { transform: translateY(120%) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes notifSlideDown {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(120%) scale(0.95); opacity: 0; }
    }
    .custom-notif-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .custom-notif-content {
      flex: 1;
      min-width: 0;
    }
    .custom-notif-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .custom-notif-body {
      font-size: 0.8rem;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .custom-notif-time {
      font-size: 0.65rem;
      color: #9ca3af;
      margin-top: 4px;
    }
    .custom-notif-close {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s, background-color 0.15s;
    }
    .custom-notif-close:hover {
      color: #374151;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="custom-notif" id="notifBox">
    <div class="custom-notif-icon"><i class="fas fa-comment-dots"></i></div>
    <div class="custom-notif-content">
      <div class="custom-notif-title" id="notifTitle">通知</div>
      <div class="custom-notif-body" id="notifBody">メッセージ</div>
      <div class="custom-notif-time">たった今</div>
    </div>
    <button class="custom-notif-close" id="closeBtn">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || '通知';
    const body = params.get('body') || '';
    const roomId = params.get('roomId') || '';

    document.getElementById('notifTitle').textContent = title;
    document.getElementById('notifBody').textContent = body;

    const { invoke } = window.__TAURI__.core;
    const { emit } = window.__TAURI__.event;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
    const appWindow = getCurrentWebviewWindow();

    function dismissAndClose() {
      document.getElementById('notifBox').classList.add('dismissing');
      setTimeout(() => {
        appWindow.close();
      }, 350);
    }

    document.getElementById('closeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      dismissAndClose();
    });

    document.getElementById('notifBox').addEventListener('click', () => {
      if (roomId) {
        // Emit event to main window
        emit('open-room', { roomId: roomId });
      }
      dismissAndClose();
    });

    // Auto close after 5 seconds
    setTimeout(dismissAndClose, 5000);
  </script>
</body>
</html>
